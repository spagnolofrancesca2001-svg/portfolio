<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Francesca Spagnolo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --fg: #111111;
  --muted: #888888;
  --border: #e0e0e0;
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --mono: 'DM Mono', monospace;
  --nav-h: 44px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-weight: 300;
  cursor: none;
  scrollbar-width: none;
}
body::-webkit-scrollbar { display: none; }

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 20px;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

.nav-logo { font-size: 14px; font-weight: 400; letter-spacing: 0.02em; color: var(--fg); text-decoration: none; }
.logo-short { display: none; }
.nav-center { display: flex; align-items: center; gap: 24px; }
.nav-link { font-size: 14px; font-weight: 300; letter-spacing: 0.05em; color: var(--muted); text-decoration: none; transition: color 0.15s; }
.nav-link:hover { color: var(--fg); }
.nav-link.active { color: #4830f9; }
.nav-right { display: flex; align-items: center; justify-content: flex-end; gap: 20px; }
.toggle-icon { display: none; }

.view-toggle { display: flex; align-items: center; gap: 24px; }
.toggle-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 300;
  letter-spacing: 0.08em; color: var(--muted); background: none;
  border: none; cursor: pointer; padding: 2px 0;
  border-bottom: 1px solid transparent; transition: color 0.15s, border-color 0.15s;
}
.toggle-btn:hover { color: var(--fg); }
.toggle-btn.active { color: var(--fg); border-bottom-color: var(--fg); }




/* MAIN GRID */
main {
  margin-top: var(--nav-h);
  padding: 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-left: 1px solid var(--border);
}

.grid-item {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: inherit;
  display: block;
  position: relative;
  overflow: hidden;
}

.grid-img {
  aspect-ratio: 4/3;
  background: #f3f3f3;
  overflow: hidden;
  position: relative;
}
.grid-item:nth-child(even) .grid-img { background: #ececec; }
.grid-item:nth-child(3n) .grid-img { background: #e6e6e6; }

/* Placeholder diagonal pattern */
.grid-img::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
}

.img-placeholder {
  width: 100%; height: 100%;
  /* Replace with: background-image: url('img/project-x.jpg'); background-size: cover; background-position: center; */
  transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
}

.grid-item:hover .img-placeholder {
  transform: scale(1.04);
}
.grid-item:hover .grid-title { color: #4830f9; }
@media (hover: none) {
  .grid-item:hover .grid-title { color: var(--fg); }
  .grid-item:active .grid-title { color: #4830f9; }
}

.grid-info {
  padding: 14px 16px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.grid-meta {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  order: 2;
  text-align: right;
}

.grid-title {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: var(--fg);
  text-align: left;
  max-width: 55%;
  line-height: 1.35;
  order: 1;
}

/* Arrow on hover */
.grid-arrow {
  position: absolute;
  top: 12px; right: 14px;
  font-size: 12px;
  color: var(--fg);
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.2s, transform 0.2s;
  font-weight: 300;
}
.grid-item:hover .grid-arrow { opacity: 1; transform: translateY(0); }

/* CUSTOM CURSOR */
.cursor {
  width: 48px;
  height: 48px;
  border: 1px solid var(--fg);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, opacity 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cursor-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--fg);
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.2s;
}
.cursor.hovering {
  width: 80px;
  height: 80px;
  background: var(--fg);
  border-color: var(--fg);
}
.cursor.hovering .cursor-label {
  opacity: 1;
  color: var(--bg);
}

/* HIDDEN ITEMS */
.grid-item.hidden { display: none; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
  body { cursor: auto; }
  .cursor { display: none; }
}
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .logo-full { display: none; }
  .logo-short { display: inline; }
  .toggle-label { display: none; }
  .toggle-icon { display: block; }
  .toggle-btn { border-bottom: none; padding: 4px; }
  .toggle-btn.active { border-bottom: none; }
}

/* MOBILE BOTTOM NAV */
.mobile-bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 52px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 200;
}
.mb-links { display: flex; gap: 20px; }
.mb-link {
  font-size: 14px; font-weight: 300;
  letter-spacing: 0.05em;
  color: var(--muted); text-decoration: none;
}
.mb-link.active { color: #4830f9; }
.mb-icons { display: flex; gap: 8px; }
.mb-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted); text-decoration: none;
  transition: color 0.15s, border-color 0.15s;
}
.mb-icon.active { color: var(--fg); border-color: var(--fg); }
</style>
</head>
<body>

<div class="cursor" id="cursor"><span class="cursor-label">view</span></div>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="logo-full">Francesca Spagnolo</span>
    <span class="logo-short">FS</span>
  </a>
  <div class="nav-center">
    <a href="index.html" class="nav-link active">Works</a>
    <a href="info.html" class="nav-link">About</a>
  </div>
  <div class="nav-right">
    <div class="view-toggle">
      <button class="toggle-btn" onclick="window.location.href='index.html'">
        <span class="toggle-label">Scroll</span>
        <svg class="toggle-icon" width="14" height="14" viewBox="0 0 15 15" fill="none"><rect x="0.5" y="0.5" width="3.5" height="14" rx="1" fill="currentColor"/><rect x="5.75" y="0.5" width="3.5" height="14" rx="1" fill="currentColor"/><rect x="11" y="0.5" width="3.5" height="14" rx="1" fill="currentColor"/></svg>
      </button>
      <button class="toggle-btn active">
        <span class="toggle-label">Grid</span>
        <svg class="toggle-icon" width="14" height="14" viewBox="0 0 15 15" fill="none"><rect x="0.5" y="0.5" width="6" height="6" rx="1" fill="currentColor"/><rect x="8.5" y="0.5" width="6" height="6" rx="1" fill="currentColor"/><rect x="0.5" y="8.5" width="6" height="6" rx="1" fill="currentColor"/><rect x="8.5" y="8.5" width="6" height="6" rx="1" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
</nav>


<main>
  <div class="grid" id="projectGrid">

  </div>
</main>

<script src="data.js"></script>
<script>
(function() {
  const grid = document.getElementById('projectGrid');
  projects.forEach(p => {
    const el = document.createElement('a');
    el.href = `project.html?id=${p.id}`;
    el.className = 'grid-item';
    el.dataset.category = p.category.toLowerCase().replace(/\s*\/\s*/g, '-');
    el.innerHTML = `
      <span class="grid-arrow">↗</span>
      <div class="grid-img"><div class="img-placeholder"></div></div>
      <div class="grid-info">
        <span class="grid-meta">${p.category} — ${p.year}</span>
        <span class="grid-title">${p.title.join(' ')}</span>
      </div>`;
    grid.appendChild(el);
  });
})();
</script>

<script>
// Cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
document.querySelectorAll('.grid-item').forEach(item => {
  item.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
  item.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
});

</script>
</body>
</html>
