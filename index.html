<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francesca Spagnolo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --fg: #111111;
  --muted: #888888;
  --border: #e0e0e0;
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --mono: 'DM Mono', monospace;
  --nav-h: 44px;
}

/* DESKTOP: body locked, scroll inside wrapper */
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-weight: 300;
  overflow: hidden;
  cursor: none;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 20px;
  z-index: 1000;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-size: 14px; font-weight: 400; letter-spacing: 0.02em; color: var(--fg); text-decoration: none; }
.logo-short { display: none; }
.nav-center { display: flex; align-items: center; gap: 24px; }
.nav-link { font-size: 14px; font-weight: 300; letter-spacing: 0.05em; color: var(--muted); text-decoration: none; transition: color 0.15s; }
.nav-link:hover { color: var(--fg); }
.nav-link.active { color: #4830f9; }
.nav-right { display: flex; align-items: center; justify-content: flex-end; gap: 20px; }
.toggle-icon { display: none; }
.view-toggle { display: flex; align-items: center; gap: 24px; }
.toggle-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 300;
  letter-spacing: 0.08em; color: var(--muted); background: none;
  border: none; cursor: pointer; padding: 2px 0;
  border-bottom: 1px solid transparent; transition: color 0.15s, border-color 0.15s;
}
.toggle-btn:hover { color: var(--fg); }
.toggle-btn.active { color: var(--fg); border-bottom-color: var(--fg); }

/* HORIZONTAL STACKING SCROLL */
.scroll-wrapper {
  position: fixed;
  top: var(--nav-h); left: 0; right: 0; bottom: 0;
  overflow-x: auto;
  overflow-y: hidden;
  cursor: none;
}
.scroll-wrapper::-webkit-scrollbar { display: none; }

.scroll-track {
  display: flex;
  align-items: stretch;
  height: 100%;
  width: max-content;
}

/* Cards: sticky left:0 so each new card slides in from the right and stacks */
.project-item {
  position: sticky;
  left: 0;
  width: 100vw;
  height: 100%;
  flex-shrink: 0;
  overflow: hidden;
  cursor: none;
  transform-origin: center center;
  will-change: transform;
}

.project-placeholder {
  width: 100%; height: 100%;
  background: #f5f5f5;
}
.project-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.project-item:nth-child(even) .project-placeholder { background: #efefef; }
.project-item:nth-child(3n)   .project-placeholder { background: #e8e8e8; }

/* Overlay: hover only on desktop */
.project-overlay {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 20px 24px;
  background: linear-gradient(rgba(255,255,255,0.95) 35%, transparent);
  opacity: 0;
  transition: opacity 0.25s;
}
.project-item:hover .project-overlay { opacity: 1; }

.project-label {
  font-family: var(--mono); font-size: 11px; font-weight: 300;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 4px;
}
.project-title {
  font-size: 14px; font-weight: 400;
  letter-spacing: 0.01em; color: var(--fg); line-height: 1.3;
}
.project-link {
  display: block; width: 100%; height: 100%;
  position: absolute; top: 0; left: 0;
  text-decoration: none;
}

/* CUSTOM CURSOR */
.cursor {
  width: 48px; height: 48px;
  border: 1px solid var(--fg); border-radius: 50%;
  position: fixed; pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.cursor-label {
  font-family: var(--mono); font-size: 8px;
  letter-spacing: 0.1em; color: var(--fg);
  text-transform: uppercase; opacity: 0; transition: opacity 0.2s;
}
.cursor.hovering { width: 80px; height: 80px; background: var(--fg); border-color: var(--fg); }
.cursor.hovering .cursor-label { opacity: 1; color: var(--bg); }

/* MOBILE: vertical stacking */
@media (max-width: 768px) {
  html { height: auto; overflow: visible; }
  body { height: auto; overflow-y: auto; overflow-x: hidden; cursor: auto; }
  .cursor { display: none; }

  .scroll-wrapper {
    position: static;
    overflow: visible;
    height: auto;
    cursor: auto;
  }
  .scroll-track {
    flex-direction: column;
    width: 100%;
    height: auto;
    padding-top: var(--nav-h);
    padding-bottom: 20px;
  }
  .project-item {
    position: sticky;
    left: auto;
    top: var(--nav-h);
    width: 100% !important;
    height: calc(100vh - var(--nav-h));
    height: calc(100dvh - var(--nav-h));
    flex-shrink: 0;
    border-radius: 12px;
    box-shadow: 0 -4px 28px rgba(0,0,0,0.10);
    transform-origin: center top;
    cursor: auto;
  }
  .project-item:nth-child(1)  { z-index: 2 !important; }
  .project-item:nth-child(2)  { z-index: 3 !important; }
  .project-item:nth-child(3)  { z-index: 4 !important; }
  .project-item:nth-child(4)  { z-index: 5 !important; }
  .project-item:nth-child(5)  { z-index: 6 !important; }
  .project-item:nth-child(6)  { z-index: 7 !important; }
  .project-item:nth-child(7)  { z-index: 8 !important; }
  .project-item:nth-child(8)  { z-index: 9 !important; }
  .project-item:nth-child(9)  { z-index: 10 !important; }
  .project-item:nth-child(10) { z-index: 11 !important; }
  .project-placeholder { height: 100%; border-radius: 12px; }
  .project-overlay {
    opacity: 1;
    background: linear-gradient(rgba(255,255,255,0.97) 0%, transparent 38%);
    padding: 20px 16px;
  }
  .project-label { font-size: 10px; }
  .project-title { font-size: 15px; }
  .logo-full { display: none; }
  .logo-short { display: inline; }
  .toggle-label { display: none; }
  .toggle-icon { display: block; }
  .toggle-btn { border-bottom: none; padding: 4px; }
  .toggle-btn.active { border-bottom: none; }
}
</style>
</head>
<body>

<div class="cursor" id="cursor"><span class="cursor-label">view</span></div>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="logo-full">Francesca Spagnolo</span>
    <span class="logo-short">FS</span>
  </a>
  <div class="nav-center">
    <a href="index.html" class="nav-link active">Works</a>
    <a href="info.html" class="nav-link">About</a>
  </div>
  <div class="nav-right">
    <div class="view-toggle">
      <button class="toggle-btn active" onclick="window.location.href='index.html'">
        <span class="toggle-label">Scroll</span>
        <svg class="toggle-icon" width="14" height="14" viewBox="0 0 15 15" fill="none"><rect x="0.5" y="0.5" width="3.5" height="14" rx="1" fill="currentColor"/><rect x="5.75" y="0.5" width="3.5" height="14" rx="1" fill="currentColor"/><rect x="11" y="0.5" width="3.5" height="14" rx="1" fill="currentColor"/></svg>
      </button>
      <button class="toggle-btn" onclick="window.location.href='grid.html'">
        <span class="toggle-label">Grid</span>
        <svg class="toggle-icon" width="14" height="14" viewBox="0 0 15 15" fill="none"><rect x="0.5" y="0.5" width="6" height="6" rx="1" fill="currentColor"/><rect x="8.5" y="0.5" width="6" height="6" rx="1" fill="currentColor"/><rect x="0.5" y="8.5" width="6" height="6" rx="1" fill="currentColor"/><rect x="8.5" y="8.5" width="6" height="6" rx="1" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="scroll-wrapper" id="scrollWrapper">
  <div class="scroll-track" id="scrollTrack"></div>
</div>

<script src="data.js"></script>
<script>
(function() {
  const track = document.getElementById('scrollTrack');
  projects.forEach(p => {
    const el = document.createElement('div');
    el.className = 'project-item';
    const cover = p.images && p.images.cover;
    el.innerHTML = `
      ${cover
        ? `<img src="${cover}" class="project-img" alt="${p.title.join(' ')}">`
        : `<div class="project-placeholder"></div>`}
      <a href="project.html?id=${p.id}" class="project-link"></a>
      <div class="project-overlay">
        <p class="project-label">${p.category} — ${p.year}</p>
        <p class="project-title">${p.title.join('<br>')}</p>
      </div>`;
    track.appendChild(el);
  });
})();
</script>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

const isMobile = window.matchMedia('(max-width: 768px)').matches;

if (!isMobile) {
  // ── DESKTOP: horizontal stacking with infinite scroll ──
  const wrapper = document.getElementById('scrollWrapper');
  const track   = document.getElementById('scrollTrack');

  const origItems = Array.from(track.querySelectorAll('.project-item'));
  const n = origItems.length;

  // Build 3 sets: [clones][originals][clones]
  origItems.forEach(item => track.appendChild(item.cloneNode(true)));
  const preFrag = document.createDocumentFragment();
  origItems.forEach(item => preFrag.appendChild(item.cloneNode(true)));
  track.insertBefore(preFrag, origItems[0]);

  const allItems = Array.from(track.querySelectorAll('.project-item'));

  // Assign increasing z-index so each card stacks above the previous
  allItems.forEach((el, i) => {
    el.style.zIndex = i + 1;
    el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
  });

  requestAnimationFrame(() => {
    const vw = wrapper.clientWidth;
    const setWidth = n * vw;

    // Jump to middle set
    wrapper.style.scrollBehavior = 'auto';
    wrapper.scrollLeft = setWidth;
    wrapper.style.scrollBehavior = '';

    // Scale animation: card being covered shrinks, entering card is full size
    function updateScale(sl) {
      allItems.forEach((card, i) => {
        const natural = i * vw;
        if (sl >= natural + vw) {
          card.style.transform = 'scale(0.92)';
        } else if (sl > natural) {
          const prog = (sl - natural) / vw;
          card.style.transform = `scale(${1 - prog * 0.08})`;
        } else {
          card.style.transform = '';
        }
      });
    }
    updateScale(setWidth);

    // Wheel → horizontal scroll
    wrapper.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaMode === 0 ? e.deltaY * 2.5 : e.deltaY * 80;
      wrapper.scrollLeft += delta;
    }, { passive: false });

    // Seamless infinite loop + scale update
    wrapper.addEventListener('scroll', () => {
      const sl = wrapper.scrollLeft;
      if (sl >= setWidth * 2) {
        wrapper.style.scrollBehavior = 'auto';
        wrapper.scrollLeft -= setWidth;
        wrapper.style.scrollBehavior = '';
        return;
      }
      if (sl < setWidth) {
        wrapper.style.scrollBehavior = 'auto';
        wrapper.scrollLeft += setWidth;
        wrapper.style.scrollBehavior = '';
        return;
      }
      updateScale(sl);
    });
  });

} else {
  // ── MOBILE: vertical stacking ──
  const track = document.getElementById('scrollTrack');
  const items = Array.from(track.querySelectorAll('.project-item'));
  const navH  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--nav-h')) || 44;

  function updateStack() {
    const vh = window.innerHeight;
    items.forEach((card, i) => {
      if (i === items.length - 1) return;
      const rect = items[i + 1].getBoundingClientRect();
      const progress = Math.max(0, Math.min(1, (vh - rect.top) / (vh - navH)));
      card.style.transform = progress > 0 ? `scale(${1 - progress * 0.10})` : '';
    });
  }

  window.addEventListener('scroll', updateStack, { passive: true });
  updateStack();
}
</script>
</body>
</html>
